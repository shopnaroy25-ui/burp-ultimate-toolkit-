version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - APP_ENV=production
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=burp
      - DB_USERNAME=burp
      - DB_PASSWORD=burp_secure_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SSL_CERT_PATH=/app/backend/storage/certs
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - burp-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=burp
      - POSTGRES_USER=burp
      - POSTGRES_PASSWORD=burp_secure_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - burp-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - burp-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/storage/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - burp-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  burp-network:
    driver: bridge
