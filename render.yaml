services:
  - type: web
    name: burp-ultimate-toolkit
    env: docker
    plan: free
    buildCommand: ""
    startCommand: ""
    healthCheckPath: /health
    envVars:
      - key: PHP_MEMORY_LIMIT
        value: 1024M
      - key: APP_ENV
        value: production
      - key: REDIS_HOST
        value: redis
      - key: DB_HOST
        value: postgres
      - key: DB_DATABASE
        value: burp
      - key: DB_USERNAME
        value: burp
      - key: DB_PASSWORD
        value: burp_secure_pass
      - key: SSL_CERT_PATH
        value: /app/backend/storage/certs

  - type: redis
    name: redis
    plan: free
    maxmemory: 100

  - type: postgres
    name: postgres
    plan: free
    database: burp
    user: burp
    password: burp_secure_pass
